include   /etc/ldap/schema/core.schema
include   /etc/ldap/schema/cosine.schema
include   /etc/ldap/schema/misc.schema
include   /etc/ldap/schema/inetorgperson.schema
# include   /etc/ldap/schema/nis.schema

pidfile  /tmp/slapd/run/slapd.pid
#argsfile /tmp/slapd/run/slapd.args

# Debian/Ubuntu slapd is a modular build: the ldif backend must be
# explicitly loaded or `database ldif` is an "unknown database type".
modulepath /usr/lib/ldap
moduleload back_ldif.la

database  ldif
directory /tmp/slapd/db

suffix    "dc=example,dc=com"
rootdn    "cn=admin,dc=example,dc=com"
# plaintext on purpose: throwaway CI fixture, and it must match the
# `ldapadd -w` password in setup.sh exactly (a stale SSHA hash here
# silently breaks the bind once slapd is finally up).
rootpw    rAR84,NZ=F

TLSCertificateFile test/env/slapdcert.pem
TLSCertificateKeyFile test/env/slapdkey.pem
